<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists & Tables</title>
</head>
<body>
    <!-- Ordered List -->
     <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
     </ol>

     <!-- Unordered List -->
      <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
      </ul>

      <!-- Description List -->
       <dl>
        <dt>HTML</dt>
        <dd>Structure of Webpage</dd>

        <dt>CSS</dt>
        <dd>Style of Webpage</dd>
       </dl>

       <!-- Tables -->
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>Rahim</td>
                <td>25</td>
            </tr>
            <tr>
                <td>Karim</td>
                <td>30</td>
            </tr>
            
        </table>
    
</body>
</html>
